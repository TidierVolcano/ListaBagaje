<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a2e4a"/>
<title>PackRo</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══ RESET & TOKENS ═══ */
:root {
  --navy:#1a2e4a; --navy2:#253d60;
  --gold:#c8892a; --gold2:#e8a83e;
  --cream:#f5f0e8; --sand:#e8dece; --white:#fff;
  --muted:#7a8ea8; --border:#ddd6c8;
  --red:#c0392b; --green:#27ae60; --teal:#2a8a7e; --rose:#b8445a;
  --text:#1a2e4a;
  --sidebar-w: 220px;
  --r:16px; --rs:10px;
  /* safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { height:100%; -webkit-text-size-adjust:100% }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100%;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
   MOBILE LAYOUT  (default, < 860px)
═══════════════════════════════════════ */

/* Fixed header — full width, content centred inside */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--navy);
  /* respect notch */
  padding-top: var(--sat);
  padding-left: var(--sal);
  padding-right: var(--sar);
}
.hdr-inner { max-width: 860px; margin: 0 auto; }
.hdr-top {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px 8px;
}
.trip-type-icon { font-size: 1.6rem; flex-shrink: 0 }
.trip-info { flex:1; min-width:0 }
.trip-dest-row { display:flex; align-items:center; gap:6px; margin-bottom:2px }
.trip-dest-name {
  font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700;
  color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:180px;
}
.dest-chevron-btn {
  background:rgba(255,255,255,.15); border:none; border-radius:99px;
  color:rgba(255,255,255,.88); font-size:.72rem; padding:3px 10px;
  cursor:pointer; display:flex; align-items:center; gap:3px;
  white-space:nowrap; flex-shrink:0; font-family:'DM Sans',sans-serif;
  font-weight:500; transition:background .15s; min-height:28px;
}
.dest-chevron-btn:hover { background:rgba(255,255,255,.25) }
.dest-chevron-btn:active { background:rgba(255,255,255,.3) }
.trip-sub {
  font-size:.67rem; color:rgba(255,255,255,.4);
  font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.6px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ring-wrap { flex-shrink:0; position:relative; width:44px; height:44px }
.ring-wrap svg { transform:rotate(-90deg) }
.ring-bg { fill:none; stroke:rgba(255,255,255,.12); stroke-width:3.5 }
.ring-fill {
  fill:none; stroke:var(--gold2); stroke-width:3.5; stroke-linecap:round;
  transition:stroke-dashoffset .5s ease;
}
.ring-pct {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:.63rem; color:#fff;
}

.hdr-actions {
  display:flex; align-items:center; gap:6px; padding:0 16px 8px; flex-wrap:wrap;
}
.pill {
  display:inline-flex; align-items:center; gap:4px; padding:6px 12px;
  border-radius:99px; border:none; font-family:'DM Sans',sans-serif;
  font-size:.76rem; font-weight:500; cursor:pointer; transition:all .15s;
  white-space:nowrap; min-height:32px;
}
.pill-g { background:rgba(255,255,255,.1); color:rgba(255,255,255,.9) }
.pill-g:hover { background:rgba(255,255,255,.2) }
.pill-g:active { background:rgba(255,255,255,.25) }
.pill-save { background:var(--gold); color:#fff }
.pill-save:hover { background:var(--gold2) }
.pill-save:active { opacity:.85 }
.spc { flex:1; min-width:4px }
.tog-pill {
  display:inline-flex; align-items:center; gap:7px; padding:6px 12px;
  border-radius:99px; background:rgba(255,255,255,.1); border:none; cursor:pointer;
  color:rgba(255,255,255,.9); font-size:.76rem; font-family:'DM Sans',sans-serif;
  transition:all .15s; min-height:32px;
}
.tog-pill:hover { background:rgba(255,255,255,.2) }
.tog-track {
  width:28px; height:16px; background:rgba(255,255,255,.22); border-radius:99px;
  position:relative; transition:background .2s; flex-shrink:0;
}
.tog-track::after {
  content:''; position:absolute; top:2.5px; left:2.5px;
  width:11px; height:11px; background:#fff; border-radius:50%;
  transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.tog-pill.on .tog-track { background:var(--gold2) }
.tog-pill.on .tog-track::after { left:14.5px }

.seg-bar {
  display:flex; background:rgba(255,255,255,.07); border-radius:99px;
  padding:3px; margin:0 16px 10px; gap:2px;
}
.seg-btn {
  flex:1; padding:6px 4px; border:none; border-radius:99px; background:transparent;
  color:rgba(255,255,255,.45); font-family:'DM Sans',sans-serif;
  font-size:.74rem; font-weight:500; cursor:pointer; transition:all .18s;
  display:flex; align-items:center; justify-content:center; gap:4px; white-space:nowrap;
  min-height:32px;
}
.seg-btn.act { background:var(--gold); color:#fff }
.seg-btn:not(.act):hover { color:rgba(255,255,255,.7) }

/* ═══ MOBILE BOTTOM TAB BAR ═══ */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:var(--navy);
  padding-bottom:var(--sab);
  padding-left:var(--sal);
  padding-right:var(--sar);
  border-top:1px solid rgba(255,255,255,.06);
  box-shadow:0 -4px 20px rgba(0,0,0,.2);
}
.tab-bar-inner { display:flex; max-width:860px; margin:0 auto }
.tab-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:8px 4px 6px; cursor:pointer;
  border:none; background:none; color:rgba(255,255,255,.36);
  transition:color .15s; font-family:'DM Sans',sans-serif;
  gap:2px; -webkit-tap-highlight-color:transparent;
  min-height:60px; position:relative; overflow:hidden;
}
.tab-item.act { color:#fff }
.tab-item.act::before {
  content:''; position:absolute; top:0; left:25%; right:25%;
  height:2px; border-radius:0 0 4px 4px; background:var(--gold2);
}
.tab-item:hover:not(.act) { color:rgba(255,255,255,.65) }
.ticon { font-size:1.3rem; line-height:1 }
.tlbl { font-size:.6rem; font-weight:500; text-align:center; line-height:1.2; white-space:nowrap }
.tdest {
  font-size:.56rem; font-family:'DM Mono',monospace; color:var(--gold2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:70px; text-align:center; line-height:1.2;
  opacity:0; transition:opacity .2s; display:block;
}
.tab-item.act .tdest { opacity:1 }
.tbadge {
  position:absolute; top:5px; right:calc(50% - 22px);
  background:var(--gold); color:#fff; border-radius:99px;
  font-size:.54rem; font-family:'DM Mono',monospace;
  padding:1px 5px; font-weight:600; min-width:14px; text-align:center;
}

/* ═══ SCROLLABLE CONTENT — MOBILE ═══ */
.content {
  /* padding-top set dynamically via JS */
  padding-top: 180px; /* fallback */
  padding-bottom: calc(60px + var(--sab) + 20px);
  padding-left: max(14px, var(--sal));
  padding-right: max(14px, var(--sar));
  max-width: 860px;
  margin: 0 auto;
}
.trip-panel { display:none }
.trip-panel.act { display:block; animation:fadeUp .2s ease }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
.vsec { display:none }
.vsec.act { display:block }

/* ═══ CATEGORY CARD ═══ */
.cat-card {
  background:var(--white); border-radius:var(--r); margin-bottom:10px;
  box-shadow:0 2px 12px rgba(26,46,74,.08); overflow:hidden;
}
.cat-hdr {
  display:flex; align-items:center; gap:10px; padding:14px 14px;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:background .12s;
}
.cat-hdr:hover { background:rgba(245,240,232,.5) }
.cat-hdr:active { background:var(--cream) }
.cat-emo { font-size:1.2rem; flex-shrink:0 }
.cat-nm {
  font-family:'Fraunces',serif; font-size:.97rem; font-weight:700;
  color:var(--text); border:none; background:transparent;
  flex:1; outline:none; min-width:0; pointer-events:none;
  font-size:16px; /* prevent iOS zoom */
}
.cat-hdr.ed .cat-nm { pointer-events:all }
.cat-bdg {
  font-family:'DM Mono',monospace; font-size:.67rem; padding:2px 9px;
  border-radius:99px; background:var(--sand); color:var(--muted); flex-shrink:0;
}
.cat-bdg.ok { background:#d4f0e0; color:var(--green) }
.cat-chv { color:var(--muted); font-size:.72rem; transition:transform .22s; flex-shrink:0 }
.cat-chv.op { transform:rotate(180deg) }
.idbtn {
  background:none; border:none; cursor:pointer; color:#ccc; font-size:1rem;
  padding:6px; transition:color .15s; line-height:1; border-radius:6px;
}
.idbtn:hover { color:var(--red); background:rgba(192,57,43,.08) }
.idbtn:active { color:var(--red) }
.cat-body { border-top:1px solid var(--sand) }
.cat-body.hid { display:none }

/* ═══ ITEM ROWS ═══ */
.items-list { padding:4px 0 }
.item-row {
  display:flex; align-items:center; gap:9px; padding:10px 14px;
  transition:background .12s;
  /* allow vertical scroll on iOS, block horizontal */
  touch-action: pan-y;
}
.item-row:hover { background:rgba(245,240,232,.6) }
.item-row:active { background:var(--cream) }
.item-row.drag { opacity:.4 }
.item-row.dov { background:rgba(200,137,42,.09); outline:2px dashed var(--gold); border-radius:8px }
.dh {
  font-size:1.1rem; color:#ccc; cursor:grab; flex-shrink:0;
  touch-action:none; padding:2px; line-height:1;
  transition:color .15s;
}
.dh:hover { color:var(--sand) }
.ichk {
  width:20px; height:20px; border-radius:6px; border:2px solid var(--border);
  flex-shrink:0; cursor:pointer; appearance:none; -webkit-appearance:none;
  position:relative; transition:all .15s; background:#fff;
}
.ichk:checked { background:var(--green); border-color:var(--green) }
.ichk:checked::after {
  content:'✓'; position:absolute; top:-1px; left:2px;
  font-size:13px; color:#fff; font-weight:700;
}
.ichk.hid { opacity:0; pointer-events:none }
.itxt {
  flex:1; border:none; background:transparent; color:var(--text);
  font-family:'DM Sans',sans-serif; outline:none; min-width:0;
  font-size:16px; /* ≥16px prevents iOS zoom on focus */
  padding:0;
}
.item-row.chked .itxt { text-decoration:line-through; color:var(--muted) }
.iqty {
  width:38px; font-family:'DM Mono',monospace; font-size:13px;
  color:var(--muted); background:var(--sand); border:none;
  border-radius:5px; padding:3px 4px; text-align:center; outline:none; flex-shrink:0;
}
.iqty:focus { background:#fff; box-shadow:0 0 0 2px var(--gold); color:var(--text) }
.add-irow {
  display:flex; gap:8px; align-items:center;
  padding:8px 14px 12px; border-top:1px dashed var(--sand);
}
.ainp {
  flex:1; border:none; background:var(--cream); border-radius:var(--rs);
  padding:10px 12px; font-size:16px; font-family:'DM Sans',sans-serif;
  color:var(--text); outline:none; transition:box-shadow .15s;
}
.ainp:focus { box-shadow:0 0 0 2px var(--gold); background:#fff }
.ainp::placeholder { color:var(--muted) }
.abtn {
  background:var(--gold); color:#fff; border:none; border-radius:var(--rs);
  width:38px; height:38px; font-size:1.4rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.abtn:hover { background:var(--gold2) }
.abtn:active { transform:scale(.93) }
.add-cat-btn {
  width:100%; border:2px dashed var(--border); background:transparent;
  border-radius:var(--r); padding:14px; cursor:pointer; color:var(--muted);
  font-size:.88rem; font-family:'DM Sans',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s; margin-bottom:10px;
}
.add-cat-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(200,137,42,.04) }
.add-cat-btn:active { border-color:var(--gold); color:var(--gold) }

/* ═══ PLACE CARDS ═══ */
.place-card {
  background:var(--white); border-radius:var(--r); margin-bottom:10px;
  box-shadow:0 2px 12px rgba(26,46,74,.08); overflow:hidden;
  border-left:4px solid var(--sand);
}
.place-card.tf { border-left-color:var(--teal) }
.place-card.tv { border-left-color:var(--rose) }
.place-card.done .place-nm { text-decoration:line-through; color:var(--muted) }
.place-top { display:flex; align-items:center; gap:10px; padding:13px 14px 10px }
.pchk {
  width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
  flex-shrink:0; cursor:pointer; appearance:none; -webkit-appearance:none;
  position:relative; transition:all .15s; background:#fff;
}
.place-card.tf .pchk:checked { background:var(--teal); border-color:var(--teal) }
.place-card.tv .pchk:checked { background:var(--rose); border-color:var(--rose) }
.pchk:checked::after { content:'✓'; position:absolute; top:-1px; left:2px; font-size:13px; color:#fff; font-weight:700 }
.place-nm {
  flex:1; font-family:'Fraunces',serif; font-size:16px; font-weight:700;
  color:var(--text); border:none; background:transparent; outline:none; min-width:0;
}
.place-nm::placeholder { color:#bbb; font-weight:400; font-style:italic }
.p-exp {
  background:none; border:none; cursor:pointer; font-size:.75rem;
  color:var(--muted); padding:6px; transition:transform .2s; flex-shrink:0;
}
.p-exp.op { transform:rotate(180deg) }
.place-meta {
  display:flex; align-items:center; gap:8px; padding:0 14px 10px; flex-wrap:wrap;
}
.m-chip {
  display:flex; align-items:center; gap:5px; background:var(--cream);
  border-radius:99px; padding:5px 12px; border:1px solid var(--border);
}
.m-chip .lbl { font-size:.68rem; color:var(--muted); white-space:nowrap }
.m-inp {
  font-size:14px; font-family:'DM Mono',monospace; color:var(--text);
  border:none; background:transparent; outline:none; width:46px; text-align:center;
}
.m-inp::placeholder { color:#bbb }
.m-sel {
  font-size:.72rem; color:var(--muted); border:none; background:transparent;
  outline:none; cursor:pointer; font-family:'DM Mono',monospace;
}
.place-det { border-top:1px solid var(--sand) }
.place-det.hid { display:none }
.place-desc-wrap { padding:10px 14px 14px }
.desc-lbl {
  font-size:.68rem; color:var(--muted); font-family:'DM Mono',monospace;
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;
}
.pdesc {
  width:100%; border:1px solid var(--border); border-radius:var(--rs);
  padding:10px 12px; font-size:15px; font-family:'DM Sans',sans-serif;
  color:var(--text); resize:none; outline:none; min-height:68px;
  line-height:1.55; transition:box-shadow .15s;
}
.pdesc:focus { box-shadow:0 0 0 2px var(--gold); border-color:var(--gold) }
.pdesc::placeholder { color:#bbb }
.add-place-btn {
  width:100%; border:2px dashed var(--border); background:transparent;
  border-radius:var(--r); padding:13px; cursor:pointer; font-size:.88rem;
  font-family:'DM Sans',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s; margin-bottom:10px; color:var(--muted);
}
.add-place-btn.pf { color:var(--teal) }
.add-place-btn.pf:hover { border-color:var(--teal); background:rgba(42,138,126,.04) }
.add-place-btn.pv { color:var(--rose) }
.add-place-btn.pv:hover { border-color:var(--rose); background:rgba(184,68,90,.04) }
.empty-st {
  text-align:center; padding:48px 20px; color:var(--muted); font-size:.9rem; line-height:1.9;
}
.empty-st .em { font-size:2.4rem; display:block; margin-bottom:12px }

/* ═══ MODALS ═══ */
.mdbg {
  position:fixed; inset:0; z-index:300;
  background:rgba(10,20,40,.6); backdrop-filter:blur(4px);
  display:none; align-items:flex-end; justify-content:center;
}
.mdbg.op { display:flex }
.mdsh {
  background:#fff; border-radius:22px 22px 0 0;
  width:100%; max-width:560px; padding:20px 20px;
  padding-bottom:calc(20px + var(--sab));
  animation:slideUp .22s ease; max-height:88vh; overflow-y:auto;
  /* keep modal above keyboard on iOS */
  -webkit-overflow-scrolling: touch;
}
@keyframes slideUp { from { transform:translateY(40px); opacity:0 } to { transform:translateY(0); opacity:1 } }
.mdh { width:36px; height:4px; background:var(--sand); border-radius:99px; margin:0 auto 18px }
.mdsh h3 { font-family:'Fraunces',serif; font-size:1.1rem; margin-bottom:4px }
.mdsh p { font-size:.84rem; color:var(--muted); margin-bottom:12px; line-height:1.5 }
.mdta {
  width:100%; height:150px; border:1px solid var(--border); border-radius:var(--rs);
  padding:10px 12px; font-family:'DM Mono',monospace; font-size:13px;
  resize:none; outline:none; color:var(--text); line-height:1.5;
  -webkit-overflow-scrolling:touch;
}
.mdta:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,137,42,.15) }
.mda { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap }
.mb {
  padding:10px 22px; border-radius:var(--rs); border:none;
  font-size:.88rem; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:opacity .15s; min-height:40px;
}
.mb:hover { opacity:.88 }
.mb:active { opacity:.75 }
.mb-c { background:var(--cream); color:var(--muted) }
.mb-n { background:var(--navy); color:#fff }
.mb-g { background:var(--gold); color:#fff }

/* Save modal input */
.save-inp {
  width:100%; border:1.5px solid var(--border); border-radius:var(--rs);
  padding:13px 14px; font-size:18px; font-family:'Fraunces',serif;
  color:var(--text); outline:none; margin-bottom:8px; transition:box-shadow .15s;
}
.save-inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,137,42,.15) }

/* Trip manager */
.mgr-type-hdr { display:flex; align-items:center; gap:8px; margin-bottom:16px }
.mgr-type-icon { font-size:1.4rem }
.mgr-type-label { font-family:'Fraunces',serif; font-size:1rem; font-weight:700 }
.dest-card {
  background:var(--cream); border-radius:var(--rs); padding:12px 14px;
  margin-bottom:8px; display:flex; align-items:center; gap:10px;
  border:2px solid transparent; transition:all .15s; cursor:default;
}
.dest-card.active-dest { border-color:var(--gold); background:#fffbf3 }
.dest-info { flex:1; min-width:0 }
.dest-name {
  font-family:'Fraunces',serif; font-size:.95rem; font-weight:700;
  color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.dest-meta { font-size:.7rem; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px }
.dest-actions { display:flex; gap:5px; flex-shrink:0 }
.dest-action-btn {
  border:1px solid var(--border); border-radius:8px; padding:5px 10px;
  font-size:.76rem; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif;
  transition:all .15s; background:#fff; min-height:32px;
}
.dest-action-btn:hover { background:var(--sand) }
.dest-action-btn.load { border-color:var(--gold); color:var(--gold); background:transparent }
.dest-action-btn.load:hover { background:var(--gold); color:#fff }
.dest-action-btn.del:hover { color:var(--red); border-color:var(--red); background:#fdf0ef }
.new-dest-btn {
  width:100%; border:2px dashed var(--border); background:transparent;
  border-radius:var(--rs); padding:12px; cursor:pointer; font-size:.88rem;
  font-family:'DM Sans',sans-serif; color:var(--gold);
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s; margin-top:6px;
}
.new-dest-btn:hover { background:rgba(200,137,42,.06); border-color:var(--gold) }

/* Toast */
.toast {
  position:fixed; left:50%; z-index:500;
  transform:translateX(-50%) translateY(20px);
  background:var(--navy); color:#fff; padding:10px 24px;

.drag-ghost {

  border-radius:10px; box-shadow:0 8px 28px rgba(0,0,0,.2);

  }
  .sidebar-tab {
    display:flex; align-items:center; gap:10px;

    width:100%; text-align:left; font-family:'DM Sans',sans-serif;

  .sidebar-tab.act { background:rgba(255,255,255,.14); color:#fff }
  .sidebar-tab.act::before {
    content:''; position:absolute; left:0; top:20%; bottom:20%;
    width:3px; border-radius:0 3px 3px 0; background:var(--gold2);
  }
  .sidebar-tab-icon { font-size:1.25rem; flex-shrink:0 }
  .sidebar-tab-info { flex:1; min-width:0 }
  .sidebar-tab-label { font-size:.82rem; font-weight:600; line-height:1.2 }
  .sidebar-tab-dest {
    font-size:.65rem; font-family:'DM Mono',monospace; color:var(--gold2);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;
  }
  .sidebar-tab-badge {
    background:var(--gold); color:#fff; border-radius:99px;
    font-size:.57rem; font-family:'DM Mono',monospace;
    padding:1px 6px; font-weight:600; flex-shrink:0;
  }

  /* Hide mobile tab bar */
  .tab-bar { display:none }

  /* App header — offset by sidebar width */
  .app-header {
    left:var(--sidebar-w); right:0; top:0;
    padding-top:var(--sat);
    padding-left:0; padding-right:0;
  }

  /* Content — offset by sidebar width */
  .content {
    margin-left:var(--sidebar-w);

    padding-left:28px; padding-right:28px;
    padding-bottom:40px;
    width:calc(100% - var(--sidebar-w));

    border-radius:18px;
    padding-bottom:20px;

  .cat-nm { font-size:1rem }

/* ═══════════════ STATE ═══════════════ */
const SK = 'packro_v7';
let S = load();
let activeType = S.activeType || 'city';
let activeView = S.activeView || 'pack';
let clMode     = S.clMode    || false;

function load() {
  try { const r=localStorage.getItem(SK); return r ? JSON.parse(r) : defState(); }
  catch { return defState(); }
}
function defState() {
  const s = {activeType:'city',activeView:'pack',clMode:false,active:{},trips:[]};
  Object.keys(TRIP_TYPES).forEach(type => {
    const t = newTrip(type,''); s.trips.push(t); s.active[type] = t.id;
  });
  return s;
}
function newTrip(type, name) {
  const cats = DEFAULT_CATS[type].map(c => ({
    id:c.id+'_'+uid(), emoji:c.e, name:c.n,
    open: c.id==='chk'||c.id==='doc',
    items: c.i.map(t => ({id:uid(),text:t,checked:false,qty:''}))
  }));
  return {id:uid(), type, name, savedAt:null, data:{categories:cats,restaurants:[],places:[],itinerary:[],infos:[]}};
}
function save() {
  S.activeType=activeType; S.activeView=activeView; S.clMode=clMode;
  try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {}
}
function uid() { return Math.random().toString(36).slice(2,9); }

function activeTripId(type) { return S.active[type||activeType]; }
function activeTrip(type)   { const id=activeTripId(type); return S.trips.find(t=>t.id===id); }
function tripData(type)     { return activeTrip(type)?.data || null; }

function ensureActive() {
  Object.keys(TRIP_TYPES).forEach(type => {
    if (!S.active[type] || !S.trips.find(t=>t.id===S.active[type])) {
      const first = S.trips.find(t=>t.type===type);
      if (first) S.active[type]=first.id;
      else { const nt=newTrip(type,''); S.trips.push(nt); S.active[type]=nt.id; }
    }
  });
}

/* ═══════════════ LAYOUT ═══════════════ */
function isDesktop() { return window.matchMedia('(min-width:860px)').matches; }

function applyLayout() {
  const sidebar = document.getElementById('sidebar');
  const tabBar  = document.getElementById('tabBar');
  if (isDesktop()) {
    sidebar.style.display = 'flex';
    tabBar.style.display  = 'none';
  } else {
    sidebar.style.display = 'none';
    tabBar.style.display  = 'block';
  }
  recalcPadding();
}

function recalcPadding() {
  requestAnimationFrame(() => {
    const h = document.getElementById('appHdr').offsetHeight;
    const content = document.querySelector('.content');
    content.style.paddingTop = h + 'px';
    // also update toast bottom if mobile
    const toast = document.getElementById('toast');
    if (!isDesktop()) {
      const tb = document.getElementById('tabBar');
      toast.style.bottom = (tb.offsetHeight + 14) + 'px';
    } else {
      toast.style.bottom = '30px';
    }
  });
}

/* ═══════════════ RENDER ═══════════════ */
function renderAll() {
  ensureActive();
  Object.keys(TRIP_TYPES).forEach(type => renderTrip(type));
  updHdr(); updTabs(); updCL(); updSeg();
}

function renderTrip(type) {
  const panel = document.getElementById('panel-'+type);
  if (!panel) return;
  const d = tripData(type);
  if (!d) return;
  panel.innerHTML = '';

  const ps = mk('div','vsec'+(activeView==='pack'?' act':''),{id:`vs-pack-${type}`});
  d.categories.forEach(cat => ps.appendChild(buildCat(cat, type)));
  const acb = mk('button','add-cat-btn'); acb.textContent='+ Adaugă categorie'; acb.onclick=()=>addCat(type);
  ps.appendChild(acb); panel.appendChild(ps);

  const fs = mk('div','vsec'+(activeView==='food'?' act':''),{id:`vs-food-${type}`});
  if (!d.restaurants.length) fs.appendChild(emptySt('🍽️','Niciun restaurant adăugat încă.'));
  else d.restaurants.forEach(r => fs.appendChild(buildPlace(r,type,'food')));
  const afb=mk('button','add-place-btn pf'); afb.innerHTML='🍽️  Adaugă restaurant / local'; afb.onclick=()=>addPlace(type,'food');
  fs.appendChild(afb); panel.appendChild(fs);

  const vs = mk('div','vsec'+(activeView==='visit'?' act':''),{id:`vs-visit-${type}`});
  if (!d.places.length) vs.appendChild(emptySt('🗺️','Niciun loc de vizitat adăugat.'));
  else d.places.forEach(p => vs.appendChild(buildPlace(p,type,'visit')));
  const avb=mk('button','add-place-btn pv'); avb.innerHTML='📍  Adaugă loc de vizitat'; avb.onclick=()=>addPlace(type,'visit');
  vs.appendChild(avb); panel.appendChild(vs);

  if (!d.itinerary) d.itinerary=[];
  const is = mk('div','vsec'+(activeView==='itin'?' act':''),{id:`vs-itin-${type}`});
  if (!d.itinerary.length) is.appendChild(emptySt('🗓️','Niciun itinerar planificat încă.<br><small style="font-size:.8rem">Adaugă zile și activitățile lor.</small>'));
  else d.itinerary.forEach(day => is.appendChild(buildItinDay(day, type)));
  const adb=mk('button','add-day-btn'); adb.innerHTML='🗓️&nbsp; Adaugă zi nouă'; adb.onclick=()=>addDay(type);
  is.appendChild(adb); panel.appendChild(is);

  if (!d.infos) d.infos=[];
  const inf = mk('div','vsec'+(activeView==='info'?' act':''),{id:`vs-info-${type}`});
  if (!d.infos.length) inf.appendChild(emptySt('ℹ️','Nicio informație utilă adăugată.<br><small style="font-size:.8rem">Ex: adresă hotel, parole WiFi, numere urgențe...</small>'));
  else d.infos.forEach(card => inf.appendChild(buildInfoCard(card, type)));
  const aib=mk('button','add-info-btn'); aib.innerHTML='ℹ️&nbsp; Adaugă informație'; aib.onclick=()=>addInfo(type);
  inf.appendChild(aib); panel.appendChild(inf);
}

  const row=mk('div','item-row'+(item.checked&&clMode?' chked':''));
  row.draggable=true; row.dataset.iid=item.id; row.dataset.cid=cid; row.dataset.type=type;
  row.innerHTML=`
    <span class="dh" data-dh title="Trage pentru reordonare">⠿</span>
    <input type="checkbox" class="ichk ${clMode?'':'hid'}" ${item.checked?'checked':''}
      onchange="togItem('${type}','${cid}','${item.id}',this.checked)"/>
    <input class="itxt" value="${e(item.text)}"
      onchange="editTxt('${type}','${cid}','${item.id}',this.value)"/>
    <input class="iqty" value="${e(item.qty||'')}" placeholder="qty"
      onchange="editQty('${type}','${cid}','${item.id}',this.value)" title="Cantitate"/>
    <button class="idbtn" onclick="delItem('${type}','${cid}','${item.id}')" title="Șterge">✕</button>`;
  row.addEventListener('dragstart', ev => { DD={iid:item.id,cid,type}; row.classList.add('drag'); ev.dataTransfer.effectAllowed='move'; });
  row.addEventListener('dragend',   ()  => clrDrag());
  row.addEventListener('dragover',  ev  => { ev.preventDefault(); row.classList.add('dov'); });
  row.addEventListener('dragleave', ()  => row.classList.remove('dov'));
  row.addEventListener('drop',      ev  => { ev.preventDefault(); dropRow(row); });
  row.querySelector('[data-dh]').addEventListener('touchstart', ev => tdStart(ev,row), {passive:false});
  return row;
}

/* ═══════════════ ITINERARIU ACTIONS ═══════════════ */
function getItinerary(type) { return tripData(type)?.itinerary; }
function addDay(type) {
  let itin=tripData(type)?.itinerary;
  if(!itin){ if(tripData(type)) tripData(type).itinerary=itin=[]; else return; }
  itin.push({id:uid(),num:itin.length+1,label:'',open:true,activities:[]});
  save(); renderTrip(type);
  requestAnimationFrame(()=>{
    const days=document.querySelectorAll(`#panel-${type} .itin-day`);
    if(days.length){ const inp=days[days.length-1].querySelector('.itin-day-label'); if(inp)inp.focus(); }
  });
}
function delDay(type,did) {
  if(!confirm('Ștergi această zi și toate activitățile ei?')) return;
  const d=tripData(type); d.itinerary=d.itinerary.filter(day=>day.id!==did);
  d.itinerary.forEach((day,i)=>day.num=i+1);
  save(); renderTrip(type);
}
function togDay(type,did) {
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return;
  day.open=!day.open; save(); renderTrip(type);
}
function editDay(type,did,field,val) {
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return; day[field]=val; save();
}
function addAct(type,did,inp) {
  const t=inp.value.trim(); if(!t) return;
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return;
  day.activities.push({id:uid(),time:'',text:t,done:false});
  inp.value=''; save(); renderTrip(type);
}
function delAct(type,did,aid) {
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return;
  day.activities=day.activities.filter(a=>a.id!==aid); save(); renderTrip(type);
}
function togAct(type,did,aid,chk) {
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return;
  const act=day.activities.find(a=>a.id===aid); if(!act) return;
  act.done=chk; save(); renderTrip(type);
}
function editAct(type,did,aid,field,val) {
  const day=getItinerary(type)?.find(d=>d.id===did); if(!day) return;
  const act=day.activities.find(a=>a.id===aid); if(!act) return;
  act[field]=val; save();
}

/* ═══════════════ INFORMAȚII UTILE ACTIONS ═══════════════ */
function getInfos(type) { return tripData(type)?.infos; }
function addInfo(type) {
  let infos=tripData(type)?.infos;
  if(!infos){ if(tripData(type)) tripData(type).infos=infos=[]; else return; }
  const icon=INFO_ICONS[infos.length % INFO_ICONS.length];
  infos.push({id:uid(),icon,title:'',body:''});
  save(); renderTrip(type);
  requestAnimationFrame(()=>{
    const cards=document.querySelectorAll(`#panel-${type} .info-card`);
    if(cards.length){ const inp=cards[cards.length-1].querySelector('.info-card-title'); if(inp)inp.focus(); }
  });
}
function delInfo(type,iid) {
  const d=tripData(type); d.infos=d.infos.filter(c=>c.id!==iid); save(); renderTrip(type);
}
function editInfo(type,iid,field,val) {
  const card=getInfos(type)?.find(c=>c.id===iid); if(!card) return; card[field]=val; save();
}
let _iconPickerCleanup=null;
function openIconPicker(ev, type, iid) {
  ev.stopPropagation();
  if(_iconPickerCleanup){ _iconPickerCleanup(); return; }
  const btn=ev.currentTarget;
  const picker=document.createElement('div'); picker.className='icon-picker';
  INFO_ICONS.forEach(ico=>{
    const b=document.createElement('button'); b.textContent=ico;
    b.onclick=()=>{ const card=getInfos(type)?.find(c=>c.id===iid); if(card){ card.icon=ico; save(); renderTrip(type); } picker.remove(); _iconPickerCleanup=null; };
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  const r=btn.getBoundingClientRect();
  picker.style.left=Math.min(r.left,window.innerWidth-230)+'px';
  picker.style.top=(r.bottom+scrollY+4)+'px';
  _iconPickerCleanup=()=>{ picker.remove(); document.removeEventListener('click',_iconPickerCleanup); _iconPickerCleanup=null; };
  setTimeout(()=>document.addEventListener('click',_iconPickerCleanup),10);
}

function mk(tag, cls, attrs) {
  const el=document.createElement(tag);
  if(cls) el.className=cls;
  if(attrs) Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

/* ═══════════════ PACK ACTIONS ═══════════════ */
function gc(type,cid) { return tripData(type)?.categories?.find(c=>c.id===cid); }
function gi(type,cid,iid) { return gc(type,cid)?.items?.find(i=>i.id===iid); }
function togCat(type,cid)  { const c=gc(type,cid); if(c)c.open=!c.open; save(); renderTrip(type); }
function renCat(type,cid,v){ const c=gc(type,cid); if(c)c.name=v; save(); }
function delCat(type,cid) {
  if(!confirm('Ștergi categoria și tot conținutul ei?')) return;
  tripData(type).categories=tripData(type).categories.filter(c=>c.id!==cid);
  save(); renderTrip(type); updHdr(); updTabs();
}
function addCat(type) {
  const n=prompt('Numele categoriei noi:'); if(!n) return;
  const ems=['📦','🔧','🎯','🌿','🛍','🎮','📷','🧴'];
  tripData(type).categories.push({id:uid(),emoji:ems[Math.random()*ems.length|0],name:n,open:true,items:[]});
  save(); renderTrip(type); toast('✓ Categorie adăugată!');
}
function aiAdd(type,cid,inp){ const t=inp.value.trim(); if(!t)return; const c=gc(type,cid); if(c)c.items.push({id:uid(),text:t,checked:false,qty:''}); inp.value=''; save(); renderTrip(type); updHdr(); updTabs(); }
function delItem(type,cid,iid){ const c=gc(type,cid); if(c)c.items=c.items.filter(i=>i.id!==iid); save(); renderTrip(type); updHdr(); updTabs(); }
function editTxt(type,cid,iid,v){ const i=gi(type,cid,iid); if(i)i.text=v; save(); }
function editQty(type,cid,iid,v){ const i=gi(type,cid,iid); if(i)i.qty=v; save(); }
function togItem(type,cid,iid,chk){ const i=gi(type,cid,iid); if(i)i.checked=chk; save(); renderTrip(type); updHdr(); updTabs(); }

/* ═══════════════ PLACE ACTIONS ═══════════════ */
function pa(type,ptype){ const d=tripData(type); return ptype==='food'?d.restaurants:d.places; }
function addPlace(type,ptype){
  pa(type,ptype).push({id:uid(),name:'',distance:'',unit:'km',desc:'',checked:false,open:true});
  save(); renderTrip(type);
  requestAnimationFrame(()=>{
    const cards=document.querySelectorAll(`#panel-${type} .place-card.t${ptype==='food'?'f':'v'}`);
    if(cards.length){ const inp=cards[cards.length-1].querySelector('.place-nm'); if(inp)inp.focus(); }
  });
}
function delPlace(type,ptype,pid){ const arr=pa(type,ptype); const i=arr.findIndex(p=>p.id===pid); if(i>-1)arr.splice(i,1); save(); renderTrip(type); }
function epf(type,ptype,pid,field,val){ const p=pa(type,ptype).find(p=>p.id===pid); if(p)p[field]=val; save(); }
function togPlace(type,ptype,pid,chk){ const p=pa(type,ptype).find(p=>p.id===pid); if(p)p.checked=chk; save(); const card=document.querySelector(`[data-pid="${pid}"]`); if(card)card.classList.toggle('done',chk); }
function togPOpen(type,ptype,pid){
  const p=pa(type,ptype).find(p=>p.id===pid); if(!p)return; p.open=!p.open; save();
  const card=document.querySelector(`[data-pid="${pid}"]`); if(!card)return;
  card.querySelector('.place-det').classList.toggle('hid',!p.open);
  card.querySelector('.p-exp').classList.toggle('op',p.open);
}

/* ═══════════════ SWITCH ═══════════════ */
function switchType(type) {
  activeType=type; save();
  document.querySelectorAll('.trip-panel').forEach(p=>p.classList.remove('act'));
  document.getElementById('panel-'+type).classList.add('act');
  // mobile tabs
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('act',t.dataset.type===type));
  // sidebar tabs
  document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.toggle('act',t.dataset.type===type));
  updHdr(); window.scrollTo({top:0,behavior:'smooth'});
}
function switchView(v) {
  activeView=v; save();
  Object.keys(TRIP_TYPES).forEach(type=>{
    ['pack','food','visit','itin','info'].forEach(vv=>{
      const s=document.getElementById(`vs-${vv}-${type}`); if(s)s.classList.toggle('act',vv===v);
    });
  });
  updSeg(); updHdr();
}

/* ═══════════════ HEADER / TABS ═══════════════ */
function updHdr() {
  const td=TRIP_TYPES[activeType], trip=activeTrip(), d=tripData(activeType);
  let tot=0,chk=0;
  if(d) d.categories.forEach(c=>{tot+=c.items.length;chk+=c.items.filter(i=>i.checked).length;});
  const pct=tot?Math.round(chk/tot*100):0;
  document.getElementById('hIcon').textContent=td.icon;
  document.getElementById('hDestName').textContent=trip?.name||'Destinație nouă';
  const sub=activeView==='pack'?`${chk}/${tot} bifate · ${td.label}`:
            activeView==='food'?`${d?.restaurants?.length||0} locuri · mâncare`:
            activeView==='visit'?`${d?.places?.length||0} obiective · vizite`:
            activeView==='itin'?`${d?.itinerary?.length||0} zile planificate`:
            `${d?.infos?.length||0} informații utile`;
  document.getElementById('hSub').textContent=sub+' — '+td.sub;
  document.getElementById('ringFill').style.strokeDashoffset=113.1-(113.1*pct/100);
  document.getElementById('ringPct').textContent=pct+'%';
  recalcPadding();
}
function updTabs() {
  Object.keys(TRIP_TYPES).forEach(type=>{
    const trip=activeTrip(type);
    const named=S.trips.filter(t=>t.type===type&&t.name&&t.savedAt);
    const d=tripData(type);
    let tot=0,chk=0;
    if(d) d.categories.forEach(c=>{tot+=c.items.length;chk+=c.items.filter(i=>i.checked).length;});
    const rem=tot-chk;
    const destName=trip?.name||'';

    // mobile tab bar
    const badge=document.getElementById('badge-'+type); if(badge) badge.textContent=named.length>1?named.length:'';
    const dest=document.getElementById('tdest-'+type);   if(dest)  dest.textContent=destName;

    // desktop sidebar
    const sbadge=document.getElementById('sbadge-'+type); if(sbadge) sbadge.textContent=named.length>1?named.length:'';
    const sdest=document.getElementById('sdest-'+type);   if(sdest)  sdest.textContent=destName;
  });
}
function updCL()  { document.getElementById('clTog').classList.toggle('on',clMode); }
function updSeg() { ['pack','food','visit','itin','info'].forEach(v=>{const b=document.getElementById('sb-'+v);if(b)b.classList.toggle('act',v===activeView);}); }
function toggleCL() { clMode=!clMode; save(); renderAll(); }

/* ═══════════════ SAVE & MANAGER ═══════════════ */
function openSave() {
  const trip=activeTrip();
  document.getElementById('saveInp').value=trip?.name||'';
  document.getElementById('saveMod').classList.add('op');
  setTimeout(()=>document.getElementById('saveInp').focus(),350);
}
function doSave() {
  const name=document.getElementById('saveInp').value.trim();
  if(!name){ document.getElementById('saveInp').focus(); return; }
  const trip=activeTrip(); if(!trip) return;
  trip.name=name; trip.savedAt=Date.now();
  save(); updHdr(); updTabs(); closeMd('saveMod');
  toast(`✓ Salvat: ${name}`);
}
function openMgr() {
  const td=TRIP_TYPES[activeType];
  document.getElementById('mgrIcon').textContent=td.icon;
  document.getElementById('mgrLabel').textContent=td.label;
  renderMgrList();
  document.getElementById('mgrMod').classList.add('op');
}
function renderMgrList() {
  const list=document.getElementById('mgrList'); list.innerHTML='';
  const trips=S.trips.filter(t=>t.type===activeType);
  const actId=activeTripId();
  trips.forEach(trip=>{
    const tot=trip.data.categories.reduce((a,c)=>a+c.items.length,0);
    const chk=trip.data.categories.reduce((a,c)=>a+c.items.filter(i=>i.checked).length,0);
    const rs=trip.data.restaurants?.length||0, pl=trip.data.places?.length||0;
    const date=trip.savedAt?new Date(trip.savedAt).toLocaleDateString('ro-RO',{day:'numeric',month:'short',year:'numeric'}):'nesalvat';
    const card=mk('div','dest-card'+(trip.id===actId?' active-dest':''));
    card.innerHTML=`
      <div class="dest-info">
        <div class="dest-name">${e(trip.name||'( fără nume )')}</div>
        <div class="dest-meta">${chk}/${tot} bifate · ${rs} rest. · ${pl} obiective · ${date}</div>
      </div>
      <div class="dest-actions">
        ${trip.id!==actId?`<button class="dest-action-btn load" onclick="loadDest('${trip.id}')">Deschide</button>`:'<span style="font-size:.72rem;color:var(--gold);font-weight:600;padding:4px 6px">✓ Activ</span>'}
        ${trips.length>1?`<button class="dest-action-btn del" onclick="deleteDest('${trip.id}')">🗑</button>`:''}
      </div>`;
    list.appendChild(card);
  });
}
function loadDest(id) {
  S.active[activeType]=id; save(); closeMd('mgrMod');
  renderTrip(activeType); updHdr(); updTabs(); toast('✓ Destinație deschisă!');
}
function deleteDest(id) {
  const trip=S.trips.find(t=>t.id===id);
  if(!confirm(`Ștergi "${trip?.name||'această destinație'}"? Datele se pierd.`)) return;
  S.trips=S.trips.filter(t=>t.id!==id);
  if(S.active[activeType]===id){ const rem=S.trips.filter(t=>t.type===activeType); S.active[activeType]=rem.length?rem[0].id:null; }
  ensureActive(); save(); renderMgrList(); renderTrip(activeType); updHdr(); updTabs(); toast('✓ Destinație ștearsă');
}
function newDest() {
  const trip=newTrip(activeType,''); S.trips.push(trip); S.active[activeType]=trip.id;
  save(); closeMd('mgrMod'); renderTrip(activeType); updHdr(); updTabs();
  toast('✓ Destinație nouă!'); setTimeout(openSave,400);
}

/* ═══════════════ EXPORT / IMPORT ═══════════════ */
let _ej='';
function openExp() {
  const trip=activeTrip();
  const d={tripType:activeType,name:trip?.name||'',...trip?.data};
  _ej=JSON.stringify(d,null,2);
  document.getElementById('expTxt').value=_ej;
  document.getElementById('expMod').classList.add('op');
}
function copyExp() {
  const ta=document.getElementById('expTxt'); ta.select(); ta.setSelectionRange(0,99999);
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(_ej).then(()=>toast('✓ Copiat în clipboard!')).catch(()=>{try{document.execCommand('copy');toast('✓ Copiat!');}catch{toast('Selectează manual și copiază');}});
  } else { try{document.execCommand('copy');toast('✓ Copiat!');}catch{toast('Selectează manual și copiază');} }
}
function dlExp() {
  try {
    const trip=activeTrip();
    const fname=`packro-${activeType}-${(trip?.name||'export').replace(/[^a-z0-9]/gi,'-')}-${new Date().toISOString().slice(0,10)}.json`;
    const blob=new Blob([_ej],{type:'application/json'}),url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},400);
    toast('✓ Fișier descărcat!');
  } catch { toast('⚠ Folosește butonul Copiază pe iOS'); }
}
function openImp(){ document.getElementById('impTxt').value=''; document.getElementById('impMod').classList.add('op'); }
function doImport() {
  try {
    const parsed=JSON.parse(document.getElementById('impTxt').value);
    if(!parsed.categories) throw new Error();
    const trip=activeTrip(); if(!trip) return;
    trip.data={categories:parsed.categories,restaurants:parsed.restaurants||[],places:parsed.places||[],itinerary:parsed.itinerary||[],infos:parsed.infos||[]};
    if(parsed.name&&!trip.name) trip.name=parsed.name;
    save(); renderAll(); closeMd('impMod'); toast('✓ Import reușit!');
  } catch { alert('JSON invalid! Folosiți JSON-ul exportat din PackRo.'); }
}
function closeMd(id){ document.getElementById(id).classList.remove('op'); }

/* ═══════════════ DRAG & DROP — DESKTOP ═══════════════ */
let DD=null;
function clrDrag(){ document.querySelectorAll('.drag,.dov').forEach(el=>el.classList.remove('drag','dov')); }
function dropRow(tr) {
  if(!DD) return; clrDrag();
  if(DD.type!==tr.dataset.type||DD.iid===tr.dataset.iid) return;
  const sc=gc(DD.type,DD.cid),tc=gc(tr.dataset.type,tr.dataset.cid); if(!sc||!tc)return;
  const si=sc.items.findIndex(i=>i.id===DD.iid),ti=tc.items.findIndex(i=>i.id===tr.dataset.iid);
  if(si<0||ti<0)return;
  const [item]=sc.items.splice(si,1); tc.items.splice(ti,0,item);
  save(); renderTrip(DD.type); DD=null;
}

/* ═══════════════ DRAG & DROP — TOUCH ═══════════════ */
let TDI=null,TG=null,TOY=0;
function tdStart(ev,row){
  if(ev.touches.length>1)return;
  const t=ev.touches[0]; TOY=t.clientY-row.getBoundingClientRect().top;
  TDI=row; row.classList.add('drag');
  TG=mk('div','drag-ghost'); TG.textContent=row.querySelector('.itxt').value;
  document.body.appendChild(TG); mvGhost(t.clientX,t.clientY);
  document.addEventListener('touchmove',tdMove,{passive:false});
  document.addEventListener('touchend',tdEnd);
}
function mvGhost(x,y){ if(!TG)return; TG.style.left=(x-90)+'px'; TG.style.top=(y-TOY+scrollY)+'px'; }
function tdMove(ev){
  ev.preventDefault(); const t=ev.touches[0]; mvGhost(t.clientX,t.clientY);
  document.querySelectorAll('.dov').forEach(el=>el.classList.remove('dov'));
  const el=document.elementFromPoint(t.clientX,t.clientY); if(!el)return;
  const r=el.closest('.item-row'); if(r&&r!==TDI)r.classList.add('dov');
}
function tdEnd(ev){
  document.removeEventListener('touchmove',tdMove); document.removeEventListener('touchend',tdEnd);
  if(TG){TG.remove();TG=null;}
  const t=ev.changedTouches[0],el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){
    const r=el.closest('.item-row');
    if(r&&r!==TDI&&r.dataset.type===TDI.dataset.type){
      const sc=gc(TDI.dataset.type,TDI.dataset.cid),tc=gc(r.dataset.type,r.dataset.cid);
      if(sc&&tc){
        const si=sc.items.findIndex(i=>i.id===TDI.dataset.iid),ti=tc.items.findIndex(i=>i.id===r.dataset.iid);
        if(si>=0&&ti>=0){const[item]=sc.items.splice(si,1);tc.items.splice(ti,0,item);save();renderTrip(TDI.dataset.type);}
      }
    }
  }
  document.querySelectorAll('.drag,.dov').forEach(el=>el.classList.remove('drag','dov')); TDI=null;
}

/* ═══════════════ TOAST & UTILS ═══════════════ */
let _toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}
function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════ INIT ═══════════════ */
// Show sidebar before render to avoid flash
applyLayout();
renderAll();
switchType(activeType);
switchView(activeView);

document.getElementById('saveInp').addEventListener('keydown',ev=>{ if(ev.key==='Enter') doSave(); });

// Recalc on resize (e.g. rotate phone, resize browser)
window.addEventListener('resize', () => { applyLayout(); updTabs(); });

// iOS: recalc when keyboard appears/disappears (changes visualViewport)
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', recalcPadding);
}
</script>
    <script>
const urlJson = 'https://raw.githubusercontent.com/TidierVolcano/ListaBagaje/refs/heads/main/lista.json';

async function incarcaLista() {
    try {
        const raspuns = await fetch(urlJson);
        if (!raspuns.ok) throw new Error('Nu am putut accesa JSON');

        const date = await raspuns.json();
        const container = document.getElementById('lista-produse');
        container.innerHTML = ''; // Curățăm containerul

        // Iterăm prin categoriile din fișierul tău (Documente, Activități, etc.)
        date.categories.forEach(categorie => {
            // Creăm un titlu pentru categorie
            const titlu = document.createElement('h3');
            titlu.textContent = categorie.emoji + " " + categorie.name;
            container.appendChild(titlu);

            const ul = document.createElement('ul');
            
            // Iterăm prin obiectele din fiecare categorie
            categorie.items.forEach(articol => {
                const li = document.createElement('li');
                li.textContent = articol.text;
                if(articol.checked) li.style.textDecoration = "line-through";
                ul.appendChild(li);
            });
            
            container.appendChild(ul);
        });

    } catch (eroare) {
        console.error('Eroare:', eroare);
        document.getElementById('lista-produse').innerHTML = 'Eroare la încărcarea datelor: ' + eroare.message;
    }
}

incarcaLista();      
    </script>
